name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. 0.5.2)'
        required: true
        type: string
      dry_run:
        description: 'Dry run (verify only: no commit, tag, release or publish)'
        required: false
        default: false
        type: boolean

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      # Required by crates-io-auth-action for OIDC trusted publishing.
      id-token: write
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Set version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'; then
            echo "::error::'$VERSION' is not a semver version (e.g. 0.5.2)"
            exit 1
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "version_tag=v${VERSION}" >> $GITHUB_OUTPUT

      - name: Fail if the tag already exists
        run: |
          TAG="${{ steps.version.outputs.version_tag }}"
          if git ls-remote --exit-code --tags origin "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "::error::Tag ${TAG} already exists"
            exit 1
          fi

      - name: Update Cargo.toml version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "0,/^version = \".*\"/s//version = \"${VERSION}\"/" Cargo.toml
          cargo update -p cooklang-reports
          grep -m1 '^version' Cargo.toml

      - name: Verify
        run: |
          cargo fmt --check
          cargo clippy --all-targets -- -D warnings
          cargo test
          cargo publish --dry-run

      - name: Commit version bump
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Cargo.toml Cargo.lock
          git commit -m "chore(release): ${{ steps.version.outputs.version }}"
          git push origin HEAD:main

      - name: Create and push tag
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          TAG="${{ steps.version.outputs.version_tag }}"
          git tag "${TAG}"
          git push origin "${TAG}"

      - name: Create GitHub release
        if: ${{ github.event.inputs.dry_run != 'true' }}
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version_tag }}
          name: Release ${{ steps.version.outputs.version_tag }}
          generate_release_notes: true

      # Trusted publishing: no CARGO_REGISTRY_TOKEN secret needed, but the crate
      # must have this repo + workflow registered as a Trusted Publisher on
      # crates.io. Same setup as cooklang-rs and CookCLI.
      # Deliberately runs on dry runs too: this is the OIDC handshake with
      # crates.io, so a dry run actually proves the Trusted Publisher config is
      # correct. It only mints a token - nothing is uploaded.
      - name: Authenticate to crates.io
        uses: rust-lang/crates-io-auth-action@v1
        id: auth

      - name: Publish to crates.io
        if: ${{ github.event.inputs.dry_run != 'true' }}
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish
